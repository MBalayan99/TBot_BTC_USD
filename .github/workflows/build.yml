name: Build

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: self-hosted  # Changed from ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step to verify the URL isn't empty or malformed before starting
      - name: Pre-flight URL check
        run: |
          if [ -z "${SONAR_HOST_URL}" ]; then
            echo "Error: SONAR_HOST_URL is empty. Check your GitHub Secrets."
            exit 1
          fi
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          # Using >- prevents shell-specific escaping issues on self-hosted runners
          # We wrap the whole D-property in quotes to be safe
          SONAR_SCANNER_OPTS: >-
            -Dhttp.extraHeaders="ngrok-skip-browser-warning:true"

      # Optional Quality Gate Check
      # - name: SonarQube Quality Gate Check
      #   uses: SonarSource/sonarqube-quality-gate-action@v1
      #   timeout-minutes: 5
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
